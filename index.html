<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kenyon Warehouse Management — Demo</title>
<style>
  /* TrustFlight brand: navy #062955, blue #1E5BB5, slate #242D41, hairline #D9D9D9, Open Sans */
  @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap');
  :root {
    --navy: #062955;
    --blue: #1E5BB5;
    --blue-soft: #e8effa;
    --bg: #f1f5f9;
    --card: #ffffff;
    --border: #dde3ea;
    --text: #242D41;
    --muted: #64748b;
    --red: #dc2626;
    --orange: #ea580c;
    --amber: #d97706;
    --green: #16a34a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Open Sans", "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  /* ---------- Top bar ---------- */
  .topbar {
    background: var(--navy);
    color: #fff;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .logoBlock { display: flex; flex-direction: column; gap: 5px; }
  .topbar img {
    width: 185px; height: auto; display: block;
    /* wordmark is blue-on-transparent; render it white on the navy bar */
    filter: brightness(0) invert(1);
  }
  .tfTag {
    font-size: 9.5px; font-weight: 600; letter-spacing: .22em;
    text-transform: uppercase; color: #8fa9cf;
  }
  .topbarTitle { border-left: 1px solid #2e5da3; padding-left: 20px; }
  .topbarTitle h1 { font-size: 21px; font-weight: 300; letter-spacing: .01em; }
  .topbarTitle p { font-size: 12.5px; opacity: .75; margin-top: 2px; }
  .topbarActions { margin-left: auto; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .demoBadge {
    background: #fbbf24; color: #3a2b00;
    font-size: 11px; font-weight: 800; letter-spacing: .08em;
    padding: 4px 10px; border-radius: 999px; text-transform: uppercase;
  }
  select.whSelect {
    background: #0d3a75; color: #fff; border: 1px solid #2e5da3;
    border-radius: 8px; padding: 8px 10px; font-size: 13.5px; min-width: 190px;
  }
  /* ---------- Buttons ---------- */
  button { font-family: inherit; cursor: pointer; }
  .primaryButton {
    background: var(--blue); color: #fff; border: none;
    border-radius: 8px; padding: 9px 16px; font-size: 13.5px; font-weight: 600;
  }
  .primaryButton:hover { background: #17498f; }
  .outlineButton {
    background: #fff; color: var(--blue); border: 1px solid var(--blue);
    border-radius: 8px; padding: 8px 15px; font-size: 13.5px; font-weight: 600;
  }
  .outlineButton:hover { background: var(--blue-soft); }
  .ghostButton {
    background: transparent; color: #cdd9ec; border: 1px solid #2e5da3;
    border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600;
  }
  .ghostButton:hover { background: #0d3a75; color: #fff; }
  button:disabled { opacity: .45; cursor: default; }
  /* ---------- Layout ---------- */
  .wrap { max-width: 1240px; margin: 0 auto; padding: 20px 24px 60px; }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px 20px; margin-bottom: 16px;
    box-shadow: 0 1px 2px rgba(15,23,42,.05);
  }
  .card h3 { font-size: 15.5px; margin-bottom: 4px; color: var(--navy); }
  .muted { color: var(--muted); font-size: 13px; }
  .small { font-size: 12px; }
  .eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: .09em;
    text-transform: uppercase; color: var(--blue); margin-bottom: 2px;
  }
  code {
    background: #eef2f7; border-radius: 5px; padding: 1px 6px;
    font-size: 12px; font-family: Consolas, monospace; color: var(--navy);
  }
  /* ---------- Tabs ---------- */
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .tab {
    background: #fff; border: 1px solid var(--border); color: var(--muted);
    border-radius: 999px; padding: 8px 18px; font-size: 13.5px; font-weight: 600;
  }
  .tab.active { background: var(--navy); border-color: var(--navy); color: #fff; }
  /* ---------- Stat tiles ---------- */
  .statGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .statTile {
    background: #fff; border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 14px 12px; text-align: left;
  }
  .statTile.clickable:hover { border-color: var(--blue); box-shadow: 0 2px 8px rgba(30,91,181,.15); }
  .statTile:disabled { opacity: 1; cursor: default; }
  .statLabel { font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
  .statValue { font-size: 26px; font-weight: 800; color: var(--navy); margin-top: 4px; }
  .statSub { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  /* ---------- Kit chips ---------- */
  .kitGrid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .kitChip {
    display: flex; align-items: center; gap: 8px;
    background: var(--blue-soft); border: 1px solid #c9dcf5; color: var(--navy);
    border-radius: 999px; padding: 6px 14px; font-size: 13px;
  }
  .kitChip:hover { background: #d8e6f9; }
  .kitChip strong { font-size: 14px; }
  /* ---------- Search ---------- */
  .searchRow { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
  .searchRow input { flex: 1; min-width: 240px; }
  input, select {
    border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 12px; font-size: 13.5px; font-family: inherit; background: #fff;
    color: var(--text);
  }
  input:focus, select:focus { outline: 2px solid #a8c4ec; border-color: var(--blue); }
  .searchHit {
    display: flex; gap: 12px; align-items: center; width: 100%;
    background: #fff; border: 1px solid var(--border); border-radius: 10px;
    padding: 9px 12px; margin-top: 8px; text-align: left;
  }
  .searchHit:hover { border-color: var(--blue); background: var(--blue-soft); }
  .searchHit strong { font-size: 13.5px; display: block; }
  /* ---------- Filters + table ---------- */
  .filterGrid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  @media (max-width: 900px) { .filterGrid { grid-template-columns: 1fr 1fr; } }
  .filterGrid input, .filterGrid select { width: 100%; min-width: 0; }
  .tableActions { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .tableScroll { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; background: #fff; }
  th {
    text-align: left; background: #f8fafc; color: var(--muted);
    font-size: 11.5px; text-transform: uppercase; letter-spacing: .04em;
    padding: 9px 12px; border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  td { padding: 9px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
  tr.invRow { cursor: pointer; }
  tr.invRow:hover { background: var(--blue-soft); }
  .whEmpty { color: var(--red); }
  .whLow { color: var(--orange); }
  .expExpired { color: var(--red); font-weight: 600; }
  .expSoon30 { color: var(--orange); font-weight: 600; }
  .expSoon90 { color: var(--amber); }
  .pagBar { display: flex; gap: 14px; align-items: center; justify-content: center; margin-top: 14px; }
  /* ---------- Scan ---------- */
  .scanInputWrap { display: flex; gap: 10px; margin-top: 12px; }
  .scanInput {
    flex: 1; font-size: 17px; padding: 13px 16px; letter-spacing: .04em;
    font-family: Consolas, monospace; border: 2px solid var(--blue);
  }
  .scanInfoGrid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px; margin: 14px 0;
  }
  .scanInfoGrid > div { background: #f8fafc; border-radius: 10px; padding: 10px 12px; }
  .scanInfoGrid span { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--muted); }
  .scanInfoGrid strong { font-size: 16px; color: var(--navy); }
  .scanActions { display: flex; gap: 10px; flex-wrap: wrap; }
  .tryChips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .recentScans { list-style: none; margin-top: 8px; }
  .recentScans li { display: flex; gap: 12px; align-items: center; padding: 7px 4px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
  .recentScans li.found span.res { color: var(--green); font-weight: 600; }
  .recentScans li.notFound span.res { color: var(--red); font-weight: 600; }
  .recentScans .muted { margin-left: auto; }
  /* ---------- Movements timeline ---------- */
  .timeline { margin-top: 10px; }
  .tlEntry { display: flex; gap: 14px; padding: 9px 4px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
  .tlTime { color: var(--muted); white-space: nowrap; min-width: 155px; font-size: 12px; padding-top: 1px; }
  /* ---------- Expiry alerts ---------- */
  .alertList { list-style: none; margin-top: 8px; }
  .alert {
    display: flex; gap: 12px; align-items: flex-start;
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; margin-bottom: 8px; cursor: pointer; background: #fff;
  }
  .alert:hover { border-color: var(--blue); background: var(--blue-soft); }
  .alertBadge {
    font-size: 11px; font-weight: 800; border-radius: 6px; padding: 4px 8px;
    white-space: nowrap; margin-top: 1px;
  }
  .sev-critical .alertBadge { background: #fee2e2; color: var(--red); }
  .sev-high .alertBadge { background: #ffedd5; color: var(--orange); }
  .sev-medium .alertBadge { background: #fef3c7; color: var(--amber); }
  .sev-low .alertBadge { background: #e0e7ff; color: #4338ca; }
  .alertBody strong { font-size: 13.5px; }
  .alertBody p { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
  .alertArrow { margin-left: auto; color: var(--muted); align-self: center; }
  /* ---------- Modal ---------- */
  .modalOverlay {
    position: fixed; inset: 0; background: rgba(6,41,85,.5);
    display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px;
  }
  .modal {
    background: #fff; border-radius: 16px; padding: 22px 24px;
    width: min(860px, 100%); max-height: 90vh; overflow-y: auto;
  }
  .modalHeader { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; margin-bottom: 14px; }
  .modalHeader h2 { font-size: 19px; color: var(--navy); }
  .closeButton { background: #eef2f7; border: none; border-radius: 8px; padding: 8px 14px; font-weight: 600; color: var(--muted); }
  .actionsRow { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .editGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .field label { display: block; font-size: 11.5px; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .field input { width: 100%; }
  .fieldWide { grid-column: 1 / -1; }
  /* ---------- Phone demo ---------- */
  .phoneModal { background: #fff; border-radius: 18px; padding: 26px; width: min(760px, 100%); max-height: 92vh; overflow-y: auto; }
  .phoneLayout { display: flex; gap: 28px; align-items: center; }
  @media (max-width: 700px) { .phoneLayout { flex-direction: column; } }
  .phoneFrame {
    width: 230px; min-width: 230px; height: 440px; background: #0b1220;
    border-radius: 34px; padding: 14px 10px; position: relative;
    box-shadow: 0 12px 32px rgba(6,41,85,.35);
  }
  .phoneNotch { width: 90px; height: 18px; background: #0b1220; border-radius: 0 0 12px 12px; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 2; }
  .phoneScreen { background: var(--bg); border-radius: 22px; height: 100%; overflow: hidden; padding: 30px 12px 12px; }
  .phoneHomeBar { width: 80px; height: 4px; background: #33415c; border-radius: 4px; position: absolute; bottom: 7px; left: 50%; transform: translateX(-50%); }
  .pHeader { font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 10px; }
  .pField { border: 2px dashed #94a3b8; border-radius: 10px; padding: 14px 10px; background: #fff; text-align: center; }
  .pField.scanning { border-color: var(--blue); border-style: solid; }
  .pFieldPh { color: #94a3b8; font-size: 12px; }
  .pHint { font-size: 11px; color: var(--muted); margin-top: 10px; line-height: 1.5; }
  .pBars { height: 42px; margin: 12px 8px 4px;
    background: repeating-linear-gradient(90deg, #0f172a 0 3px, transparent 3px 5px, #0f172a 5px 6px, transparent 6px 10px); border-radius: 2px; }
  .pBarTxt { text-align: center; font-family: Consolas, monospace; font-size: 12px; margin-bottom: 6px; }
  .pCard { background: #fff; border-radius: 12px; padding: 12px; box-shadow: 0 2px 6px rgba(15,23,42,.1); }
  .pCard h4 { font-size: 13px; color: var(--navy); margin: 3px 0; }
  .pEyebrow { font-size: 9.5px; font-weight: 700; text-transform: uppercase; color: var(--blue); }
  .pBarcode { font-family: Consolas, monospace; font-size: 11px; color: var(--muted); }
  .pStats { display: flex; gap: 6px; margin-top: 10px; }
  .pStats > div { flex: 1; background: #f1f5f9; border-radius: 8px; padding: 6px; text-align: center; }
  .pStats span { display: block; font-size: 8.5px; text-transform: uppercase; font-weight: 700; color: var(--muted); }
  .pStats strong { font-size: 12px; color: var(--navy); }
  .pActions { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 12px; }
  .pBtn { border: 1px solid var(--blue); background: #fff; color: var(--blue); border-radius: 8px; padding: 8px 4px; font-size: 10.5px; font-weight: 700; }
  .pBtn.primary { background: var(--blue); color: #fff; }
  .pBtn.pulsing { animation: pulse 1.2s infinite; }
  .pBtn.fullWidth { grid-column: 1 / -1; margin-top: 12px; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(30,91,181,.55);} 50% { box-shadow: 0 0 0 9px rgba(30,91,181,0);} }
  .pToast { background: #dcfce7; border: 1px solid #86efac; color: #14532d; border-radius: 10px; padding: 12px; font-size: 11.5px; line-height: 1.5; }
  .pToastSub { color: #15803d; font-weight: 700; }
  .pNotFound { background: #fee2e2; border: 1px solid #fca5a5; color: #7f1d1d; border-radius: 10px; padding: 12px; font-size: 11.5px; text-align: center; }
  .pNotFound code { display: block; margin-top: 6px; }
  .phoneCopy h2 { font-size: 19px; color: var(--navy); margin: 4px 0 8px; }
  .phoneCopy > p { font-size: 13.5px; color: var(--text); line-height: 1.55; }
  .demoDots { display: flex; gap: 8px; margin: 18px 0 14px; }
  .demoDot { width: 12px; height: 12px; border-radius: 50%; border: none; background: #cbd5e1; }
  .demoDot.done { background: #93b6e8; }
  .demoDot.active { background: var(--blue); transform: scale(1.25); }
  .demoControls { display: flex; gap: 8px; flex-wrap: wrap; }
  .btnSmall { padding: 7px 12px; font-size: 12.5px; }
  .emptyNote { padding: 26px; text-align: center; }
  .tfFooter {
    margin-top: 28px; padding-top: 18px; border-top: 1px solid #D9D9D9;
    text-align: center; font-size: 12px; color: var(--muted); line-height: 1.7;
  }
  .tfFooter strong { color: var(--navy); font-weight: 700; }
  /* ---------- Pick lists ---------- */
  .plShortfall {
    background: #fef3c7; border: 1px solid #fcd34d; color: #78350f;
    border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 12px;
  }
  .plHistRow {
    display: flex; gap: 14px; align-items: center;
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px; margin-top: 10px;
  }
  .plStatus {
    font-size: 10.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em;
    border-radius: 6px; padding: 4px 9px;
  }
  .plStatus.issued { background: #dcfce7; color: #166534; }
  .plStatus.proposed { background: var(--blue-soft); color: var(--blue); }
  .tplCard {
    border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; margin-top: 12px;
  }
  .tplTable { margin-top: 10px; }
  .tplTable td, .tplTable th { padding: 6px 8px; }
  /* ---------- Welcome tour ---------- */
  .tourRow {
    display: flex; gap: 14px; align-items: center; width: 100%; text-align: left;
    background: #fff; border: 1px solid var(--border); border-radius: 12px;
    padding: 13px 16px; margin-top: 10px; cursor: pointer;
  }
  .tourRow:hover { border-color: var(--blue); background: var(--blue-soft); }
  .tourIcon { font-size: 22px; }
  .tourRow strong { display: block; font-size: 14px; color: var(--navy); }
  .tourRow p { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
  .tourGo { margin-left: auto; color: var(--blue); font-weight: 700; white-space: nowrap; font-size: 13px; }
  .tourFoot { margin-top: 16px; font-size: 12px; color: var(--muted); line-height: 1.6; }
  /* ---------- Valuation chart ---------- */
  .valChart {
    display: flex; gap: 18px; align-items: flex-end;
    padding: 18px 6px 4px; overflow-x: auto;
  }
  .valBarWrap { display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 82px; }
  .valBar {
    width: 46px; background: #9db9e2; border-radius: 6px 6px 0 0;
    border-bottom: 3px solid var(--navy);
  }
  .valBar.live { background: var(--blue); }
  .valBarValue { font-size: 11px; font-weight: 700; color: var(--navy); }
  .valBarLabel { font-size: 10.5px; color: var(--muted); text-align: center; }
</style>
</head>
<body>

<header class="topbar">
  <div class="logoBlock">
    <img id="kenyonLogo" alt="Kenyon Emergency Services">
    <span class="tfTag">A TrustFlight Company</span>
  </div>
  <div class="topbarTitle">
    <h1>Warehouse Management</h1>
    <p>Kenyon Operations · stock register, valuation, pick lists, expiry alerting</p>
  </div>
  <div class="topbarActions">
    <span class="demoBadge">Demo</span>
    <select class="whSelect" id="whSelect" onchange="switchWarehouse(this.value)"></select>
    <select class="whSelect" id="roleSelect" onchange="switchRole(this.value)" style="min-width:170px">
      <option value="admin">&#128100; Administrator</option>
      <option value="staff">&#128100; Warehouse staff</option>
    </select>
    <button class="ghostButton" onclick="openTour()">&#10024; Tour</button>
    <button class="ghostButton" onclick="openPhoneDemo()">&#128241; How to scan</button>
    <button class="ghostButton" id="resetBtn" onclick="resetDemo()">Reset demo data</button>
  </div>
</header>

<div class="wrap">
  <div class="card" id="introCard"></div>
  <div class="card"><div class="tabs" id="tabsBar"></div></div>
  <div id="content"></div>
  <footer class="tfFooter">
    Kenyon Emergency Services · a <strong>TrustFlight</strong> company<br>
    Demonstration system — all data is illustrative and stored only in this browser.
  </footer>
</div>

<div id="modalRoot"></div>
<div id="dialogRoot"></div>
<input type="file" id="csvFileInput" accept=".csv,text/csv" style="display:none" onchange="handleCsvFile(this.files[0]); this.value='';">

<script>
/* =============================================================
   Kenyon Warehouse Management — standalone demo
   Single file, no build step, no server. Data persists in
   localStorage. Bracknell is seeded from a sample of the 2026

/* ---------------- helpers ---------------- */
const esc = (s) => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const pad6 = (n) => String(n).padStart(6, '0');
const isoDaysFromNow = (d) => { const t = new Date(); t.setDate(t.getDate() + d); return t.toISOString().slice(0, 10); };
function daysUntil(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return null;
  const t = new Date(); t.setHours(0,0,0,0);
  return Math.floor((d - t) / 86400000);
}
function expiryClass(dateStr) {
  const days = daysUntil(dateStr);
  if (days === null) return '';
  if (days < 0) return 'expExpired';
  if (days <= 30) return 'expSoon30';
  if (days <= 90) return 'expSoon90';
  return '';
}
function expiryLabel(dateStr) {
  const days = daysUntil(dateStr);
  if (days === null) return '';
  if (days < 0) return 'EXPIRED ' + Math.abs(days) + 'd ago';
  if (days === 0) return 'expires today';
  return days + 'd left';
}
function stockStatus(onHand, target) {
  const a = Number(onHand), b = Number(target);
  if (!isFinite(a) || !isFinite(b) || b === 0) return 'unknown';
  if (a === 0) return 'empty';
  if (a < b) return 'low';
  return 'ok';
}
// deterministic pseudo-random 0..1 per index (stable across reloads)
function prand(i) { const x = Math.sin(i * 127.1 + 311.7) * 43758.5453; return x - Math.floor(x); }

/* ---------------- seeding ---------------- */
const EXPIRY_KITS = ['Medical', 'Embalming', 'Reference DNA', 'Familial DNA Collection', 'Bio Seal', 'Family Assistance', 'Morgue'];
function buildSeedItems() {
  return SEED.map((raw, i) => {
    const barcode = 'BRA-' + pad6(i + 1);
    // demo enrichment: expiry dates on consumable kits, rack locations, inspection dates
    let expiry = raw.expiry || '';
    if (!expiry && EXPIRY_KITS.includes(raw.kit) && prand(i) < 0.38) {
      expiry = isoDaysFromNow(Math.floor(prand(i + 500) * 480) - 50); // -50d .. +430d
    }
    const location = raw.location ||
      ('Row ' + (1 + Math.floor(prand(i + 900) * 6)) +
       ' · Bay ' + String.fromCharCode(65 + Math.floor(prand(i + 901) * 5)) +
       ' · Shelf ' + (1 + Math.floor(prand(i + 902) * 4)));
    let lastCheckedAt = '';
    if (prand(i + 300) < 0.55) {
      lastCheckedAt = new Date(Date.now() - Math.floor(prand(i + 301) * 290) * 86400000).toISOString();
    }
    return {
      id: barcode, barcode,
      kit: raw.kit || '', box: raw.box || '', description: raw.description || '',
      unitOfIssue: raw.unitOfIssue || '',
      stockTarget: Number(raw.stockTarget) || 0,
      onHand: Number(raw.onHand) || 0,
      reorderCode: raw.reorderCode || '', supplier: raw.supplier || '',
      costPerItem: Number(raw.costPerItem) || 0,
      expiry, location, tariff: raw.tariff || '', cpc: raw.cpc || '',
      notes: '', lastCheckedAt,
      createdAt: new Date().toISOString(),
    };
  });
}

/* ---------------- activation templates (finance proposal §5) ----------------
   Configurable templates defining what a small/medium/large activation
   requires — editable by an administrator without code changes. */
const TEMPLATE_KITS = ['PPE', 'Medical', 'Family Assistance', 'Reference DNA', 'PE'];
function buildDefaultTemplates(items) {
  // pick up to 3 distinct item descriptions from each key kit
  const lines = [];
  TEMPLATE_KITS.forEach((kit, k) => {
    const seen = new Set();
    for (const it of items) {
      if (it.kit !== kit || seen.has(it.description)) continue;
      seen.add(it.description);
      lines.push({ description: it.description, qty: 1 + Math.floor(prand(k * 37 + seen.size) * 3) });
      if (seen.size >= 3) break;
    }
  });
  const scale = (mult) => lines.map(l => ({ description: l.description, qty: Math.max(1, l.qty * mult) }));
  return [
    { id: 'tpl_small',  name: 'Small activation',  note: 'Localised incident, single team deploying', lines: scale(1) },
    { id: 'tpl_medium', name: 'Medium activation', note: 'Multi-team response, FAC setup',            lines: scale(3) },
    { id: 'tpl_large',  name: 'Large activation',  note: 'Full-scale response, both warehouses on standby', lines: scale(6) },
  ];
}
function loadTemplates() {
  const saved = localStorage.getItem('whdemo_templates');
  if (saved) { try { return JSON.parse(saved); } catch (e) {} }
  const defaults = buildDefaultTemplates(loadItems('bracknell'));
  try { localStorage.setItem('whdemo_templates', JSON.stringify(defaults)); } catch (e) {}
  return defaults;
}
function persistTemplates() { try { localStorage.setItem('whdemo_templates', JSON.stringify(S.templates)); } catch (e) {} }

/* ---------------- valuation snapshots (finance proposal §5) ---------------- */
function warehouseValue(whId) {
  const items = whId === S.whId ? S.items : (() => {
    const saved = localStorage.getItem(K('items', whId));
    if (!saved) return [];
    try { return JSON.parse(saved); } catch (e) { return []; }
  })();
  return items.reduce((sum, it) => sum + (Number(it.onHand) || 0) * (Number(it.costPerItem) || 0), 0);
}
function loadSnapshots() {
  const saved = localStorage.getItem('whdemo_snapshots');
  if (saved) { try { return JSON.parse(saved); } catch (e) {} }
  // seed a plausible history so the trend view isn't empty on first open
  const nowTotal = warehouseValue('bracknell') + warehouseValue('houston');
  const seeded = [-120, -90, -60, -30].map((d, i) => {
    const total = Math.round(nowTotal * (0.80 + prand(i + 77) * 0.17));
    return { date: isoDaysFromNow(d), bracknell: total, houston: 0, total, by: 'System (seeded)' };
  });
  try { localStorage.setItem('whdemo_snapshots', JSON.stringify(seeded)); } catch (e) {}
  return seeded;
}
function takeSnapshot() {
  const snaps = loadSnapshots();
  const b = Math.round(warehouseValue('bracknell')), h = Math.round(warehouseValue('houston'));
  const entry = { date: isoDaysFromNow(0), bracknell: b, houston: h, total: b + h, by: OPERATOR };
  const next = snaps.filter(s => s.date !== entry.date).concat([entry]);
  try { localStorage.setItem('whdemo_snapshots', JSON.stringify(next)); } catch (e) {}
  render();
}

/* In-app dialog (replaces native prompt/confirm — those are blocked or
   invisible in embedded webviews, which froze the demo). Returns a Promise:
   array of field values on OK, true on OK with no fields, null on cancel. */
function askDialog({ title, message, fields = [], okLabel = 'OK', danger = false }) {
  return new Promise((resolve) => {
    const root = document.getElementById('dialogRoot');
    const f = fields.map((fl, i) =>
      '<div class="field" style="margin-bottom:10px"><label>' + esc(fl.label) + '</label>' +
      '<input id="dlgF' + i + '" type="' + (fl.type || 'text') + '" value="' + esc(fl.value ?? '') + '"></div>').join('');
    root.innerHTML =
      '<div class="modalOverlay" style="z-index:80"><div class="modal" style="width:min(430px,100%)">' +
      '<h3 style="margin-bottom:6px">' + esc(title) + '</h3>' +
      (message ? '<p class="muted" style="margin-bottom:12px">' + esc(message) + '</p>' : '<div style="height:4px"></div>') +
      f +
      '<div class="actionsRow" style="margin:14px 0 0">' +
      '<button class="primaryButton" id="dlgOk"' + (danger ? ' style="background:var(--red)"' : '') + '>' + esc(okLabel) + '</button>' +
      '<button class="outlineButton" id="dlgCancel">Cancel</button></div>' +
      '</div></div>';
    // Blur whatever button opened us so a stray Enter/Space can't re-trigger it,
    // and ignore OK for the first 300ms so a double-dispatched click can't confirm.
    if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
    const armedAt = Date.now();
    const done = (val) => { root.innerHTML = ''; resolve(val); };
    const okNow = () => {
      if (Date.now() - armedAt < 300) return;
      done(fields.length ? fields.map((_, i) => document.getElementById('dlgF' + i).value) : true);
    };
    document.getElementById('dlgOk').onclick = okNow;
    document.getElementById('dlgCancel').onclick = () => done(null);
    root.firstChild.addEventListener('click', (e) => { if (e.target === root.firstChild) done(null); });
    root.firstChild.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); okNow(); }
      if (e.key === 'Escape') done(null);
    });
    const first = document.getElementById('dlgF0');
    if (first) { first.focus(); if (first.select) first.select(); }
  });
}

/* quick actions (shared by modal + scan) */
async function actChargeOut(id) {
  const it = S.items.find(x => x.id === id); if (!it) return;
  const res = await askDialog({
    title: 'Charge out', message: it.description + ' — on hand: ' + it.onHand,
    fields: [
      { label: 'Quantity to charge out', type: 'number', value: '1' },
      { label: 'Incident / purpose (optional)', value: 'Incident 6048' },
    ],
    okLabel: 'Charge Out',
  });
  if (!res) return;
  const qty = Number(res[0]);
  if (!qty || qty <= 0) return;
  const onHand = Math.max(0, Number(it.onHand) - qty);
  updateItem(id, { onHand });
  recordMovement({ type: 'charge-out', itemId: id, barcode: it.barcode, description: it.description, qty, notes: res[1] || '' });
  refreshAfterAction(id);
}
async function actReplenish(id) {
  const it = S.items.find(x => x.id === id); if (!it) return;
  const res = await askDialog({
    title: 'Replenish', message: it.description + ' — on hand: ' + it.onHand,
    fields: [
      { label: 'Quantity received', type: 'number', value: '1' },
      { label: 'Source / supplier (optional)', value: it.supplier },

  if (!res) return;
  const qty = Number(res[0]);

}

/* ----- overview ----- */
function renderOverview() {
  let totalOnHand = 0, totalValue = 0, low = 0, empty = 0, exp = 0, e30 = 0, e90 = 0;
  const byKit = {};
  S.items.forEach(it => {
    byKit[it.kit] = (byKit[it.kit] || 0) + 1;
    totalOnHand += Number(it.onHand) || 0;
    totalValue += (Number(it.onHand) || 0) * (Number(it.costPerItem) || 0);
    const st = stockStatus(it.onHand, it.stockTarget);
    if (st === 'low') low++; if (st === 'empty') empty++;
    const d = daysUntil(it.expiry);
    if (d !== null) { if (d < 0) exp++; else if (d <= 30) e30++; else if (d <= 90) e90++; }
  });
  const recent = S.movements.filter(m => Date.now() - new Date(m.timestamp).getTime() < 7 * 86400000).length;
  const cur = wh().cur;
  const val = cur + totalValue.toLocaleString(undefined, { maximumFractionDigits: 0 });

  const tile = (label, value, sub, color, onclick) =>
    '<button class="statTile' + (onclick ? ' clickable' : '') + '" ' + (onclick ? 'onclick="' + onclick + '"' : 'disabled') + '>' +
    '<p class="statLabel">' + label + '</p>' +
    '<p class="statValue"' + (color ? ' style="color:' + color + '"' : '') + '>' + value + '</p>' +
    (sub ? '<p class="statSub">' + sub + '</p>' : '') + '</button>';

  const q = S.overviewQ.trim().toLowerCase();
  let hits = '';
  if (q) {
    const matches = S.items.filter(it =>
      [it.description, it.barcode, it.box, it.kit, it.supplier, it.location, it.reorderCode].join(' ').toLowerCase().includes(q)
    ).slice(0, 5);
    if (matches.length) {
      hits = '<p class="muted" style="margin-top:12px">Top matches — click to open in Inventory:</p>' +
        matches.map(it =>
          '<button class="searchHit" onclick="jumpToInventory({search: overviewQVal()})">' +
          '<code>' + esc(it.barcode) + '</code><div><strong>' + esc(it.description) + '</strong>' +
          '<span class="muted">' + esc(it.kit) + ' · ' + esc(it.box) + ' · on hand ' + it.onHand + ' of ' + it.stockTarget + '</span></div></button>'
        ).join('');
    }
  }

  const kitChips = Object.entries(byKit).sort((a, b) => b[1] - a[1]).map(([kit, count]) =>
    '<button class="kitChip" onclick="jumpToInventory({kit: \'' + esc(kit).replace(/'/g, "\\'") + '\'})"><strong>' + count + '</strong><span>' + esc(kit || '(no kit)') + '</span></button>'
  ).join('');

  return (
    '<div class="card"><h3>Search inventory</h3>' +
    '<p class="muted">Find any item by name, barcode, box, supplier, location, or reorder code.</p>' +
    '<div class="searchRow">' +
    '<input id="ovq" placeholder="e.g. body bag, BRA-000120, Screwfix, Row 3…" value="' + esc(S.overviewQ) + '" oninput="S.overviewQ=this.value;render();ovFocus()" onkeydown="if(event.key===\'Enter\'&&this.value.trim())jumpToInventory({search:this.value.trim()})">' +
    '<button class="primaryButton" onclick="var v=document.getElementById(\'ovq\').value.trim(); if(v) jumpToInventory({search:v})">&#8981; Search</button>' +
    '</div>' + hits + '</div>' +

    '<div class="statGrid" style="margin-bottom:16px">' +
    tile('Total items', S.items.length, totalOnHand.toLocaleString() + ' units on hand', null, "jumpToInventory({})") +
    tile('Inventory value', val, 'live · click for history', null, "setTab('valuation')") +
    tile('Empty slots', empty, null, empty > 0 ? 'var(--red)' : null, "jumpToInventory({stock:'empty'})") +
    tile('Low stock', low, null, low > 0 ? 'var(--orange)' : null, "jumpToInventory({stock:'low'})") +
    tile('Expired', exp, null, exp > 0 ? 'var(--red)' : null, "setTab('expiries')") +

/* ----- inventory ----- */
function invFiltered() {
  const q = S.search.trim().toLowerCase();
  return S.items.filter(it => {
    if (S.kitFilter !== 'All' && it.kit !== S.kitFilter) return false;
    if (S.boxFilter !== 'All' && it.box !== S.boxFilter) return false;
    if (S.supplierFilter !== 'All' && it.supplier !== S.supplierFilter) return false;
    if (S.stockFilter !== 'All' && stockStatus(it.onHand, it.stockTarget) !== S.stockFilter) return false;
    if (q && ![it.description, it.barcode, it.box, it.kit, it.supplier, it.location, it.reorderCode].join(' ').toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderExpiries() {
  const exp = [], lt30 = [], lt90 = [], lt180 = [], overdue = [];
  const sixMonthsAgo = Date.now() - 180 * 86400000;
  S.items.forEach(it => {
    const d = daysUntil(it.expiry);
    if (d !== null) {
      if (d < 0) exp.push({ ...it, days: d });
      else if (d <= 30) lt30.push({ ...it, days: d });
      else if (d <= 90) lt90.push({ ...it, days: d });
      else if (d <= 180) lt180.push({ ...it, days: d });
    }
    const last = it.lastCheckedAt ? new Date(it.lastCheckedAt).getTime() : 0;
    if (!it.lastCheckedAt || last < sixMonthsAgo) overdue.push(it);
  });
  [exp, lt30, lt90, lt180].forEach(a => a.sort((x, y) => x.days - y.days));

  const section = (title, rows, sev) =>
    '<div class="card"><h3>' + title + ' <span class="muted">(' + rows.length + ')</span></h3>' +
    (rows.length === 0 ? '<p class="muted">None.</p>' :

        '<div class="alertBody"><strong>' + esc(it.description) + '</strong><span class="muted"> · ' + esc(it.kit) + '</span>' +
        '<p>' + esc(it.box) + ' · ' + esc(it.location || 'no location') + (it.expiry ? ' · expires ' + esc(it.expiry) : '') + ' · <code>' + esc(it.barcode) + '</code></p></div>' +
        '<span class="alertArrow">→</span></li>').join('') +
      (rows.length > 50 ? '<li class="muted small" style="padding:6px">+ ' + (rows.length - 50) + ' more not shown</li>' : '') + '</ul>') +
    '</div>';

  return (
    '<p class="muted small" style="margin-bottom:10px">Click any item to update its expiry, mark it checked, charge it out, or replenish.</p>' +

/* ----- pick lists (finance proposal §5: Phase 2) -----
   Select an activation template; the engine proposes a pick list from
   current stock, prioritising nearest-expiry stock first. Issuing a pick
   list decrements stock and writes to the audit trail. */
function allocateLine(desc, qtyNeeded) {
  const candidates = S.items
    .filter(it => {
      if (it.description !== desc || Number(it.onHand) <= 0) return false;
      const d = daysUntil(it.expiry);
      return d === null || d >= 0; // never pick expired stock
    })
    .sort((a, b) => {
      const da = daysUntil(a.expiry), db = daysUntil(b.expiry);
      if (da === null && db === null) return 0;
      if (da === null) return 1;   // undated stock last — use nearest expiry first
      if (db === null) return -1;
      return da - db;
    });
  const allocs = [];
  let remaining = qtyNeeded;
  for (const it of candidates) {
    if (remaining <= 0) break;
    const take = Math.min(remaining, Number(it.onHand));
    allocs.push({ itemId: it.id, barcode: it.barcode, description: desc, qty: take, location: it.location, expiry: it.expiry, box: it.box });
    remaining -= take;
  }
  return { allocs, short: remaining };
}
function generatePickList() {
  const tpl = S.templates.find(t => t.id === S.pickTemplateId) || S.templates[0];
  if (!tpl) return;
  // merge duplicate descriptions first so the same stock line is never allocated twice
  const agg = {};
  tpl.lines.forEach(l => { agg[l.description] = (agg[l.description] || 0) + (Number(l.qty) || 0); });
  const lines = [], shortfalls = [];
  Object.entries(agg).forEach(([description, qty]) => {
    const { allocs, short } = allocateLine(description, qty);
    lines.push(...allocs);
    if (short > 0) shortfalls.push({ description, requested: qty, short });
  });
  S.pickProposal = {
    id: 'PL-' + String(S.picklists.length + 1).padStart(4, '0'),
    templateName: tpl.name,
    activationRef: S.pickRef.trim() || '(no reference)',
    createdAt: new Date().toISOString(),
    status: 'proposed',
    lines, shortfalls,
  };
  render();
}
function issuePickList() {
  const pl = S.pickProposal;
  if (!pl || !pl.lines.length) return;
  pl.lines.forEach(l => {
    const it = S.items.find(x => x.id === l.itemId);
    if (it) updateItem(it.id, { onHand: Math.max(0, Number(it.onHand) - l.qty) });
    recordMovement({
      type: 'pick-issued', itemId: l.itemId, barcode: l.barcode,
      description: l.description, qty: l.qty,
      notes: pl.id + ' · ' + pl.activationRef,
    });
  });
  pl.status = 'issued';
  pl.issuedAt = new Date().toISOString();
  S.picklists = [pl, ...S.picklists];
  persistPicklists();
  S.pickProposal = null;
  render();
}

function exportPickListCsv(plId) {

function downloadCsv(headers, rows, filename) {

      '</div>';

      card += '<table class="tplTable"><thead><tr><th>Item (must exist in stock)</th><th style="width:90px">Qty</th><th style="width:70px"></th></tr></thead><tbody>' +

          '<td><input type="number" min="1" value="' + l.qty + '" style="width:80px" onchange="tplUpdateLine(\'' + esc(t.id) + '\',' + i + ',this.value)"></td>' +

        '<tr><td><input id="tplAddDesc" list="itemDescList" placeholder="Type an item description…" style="width:100%"></td>' +
        '<td><input id="tplAddQty" type="number" min="1" value="1" style="width:80px"></td>' +
        '<td><button class="primaryButton btnSmall" onclick="tplAddLine(\'' + esc(t.id) + '\')">Add</button></td></tr>' +
        '</tbody></table>';
    } else {
      card += '<p class="muted small" style="margin-top:6px">' +
        t.lines.slice(0, 6).map(l => esc(l.description) + ' ×' + l.qty).join(' · ') +
        (t.lines.length > 6 ? ' · +' + (t.lines.length - 6) + ' more' : '') + '</p>';
    }
    return card + '</div>';
  }).join('');
  const descList = Array.from(new Set(S.items.map(i => i.description).filter(Boolean))).sort();
  html += '<datalist id="itemDescList">' + descList.map(d => '<option value="' + esc(d) + '">').join('') + '</datalist></div>';
  return html;
}

/* ----- valuation (finance proposal §5: Phase 1) ----- */
function exportValuationCsv() {
  const byKit = {};
  S.items.forEach(it => {
    if (!byKit[it.kit]) byKit[it.kit] = { items: 0, units: 0, value: 0 };
    byKit[it.kit].items++;
    byKit[it.kit].units += Number(it.onHand) || 0;
    byKit[it.kit].value += (Number(it.onHand) || 0) * (Number(it.costPerItem) || 0);
  });
  const rows = Object.entries(byKit).sort((a, b) => b[1].value - a[1].value)
    .map(([kit, v]) => [wh().label, kit, v.items, v.units, v.value.toFixed(2)]);
  downloadCsv(['Warehouse', 'Kit Category', 'Stock Lines', 'Units On Hand', 'Value'], rows, 'valuation-' + S.whId + '.csv');
}
function exportExpiryCsv() {
  const rows = S.items.filter(it => it.expiry).sort((a, b) => (daysUntil(a.expiry) ?? 9e9) - (daysUntil(b.expiry) ?? 9e9))
    .map(it => {
      const d = daysUntil(it.expiry);
      const band = d < 0 ? 'EXPIRED' : d <= 30 ? '<=30 days' : d <= 90 ? '31-90 days' : d <= 180 ? '91-180 days' : 'Healthy';
      return [it.barcode, it.description, it.kit, it.expiry, band, it.onHand, it.location];
    });
  downloadCsv(['Barcode', 'Description', 'Kit', 'Expiry', 'Band', 'On Hand', 'Location'], rows, 'expiry-report-' + S.whId + '.csv');
}

  const bVal = warehouseValue('bracknell'), hVal = warehouseValue('houston');

/* ----- CSV import (finance proposal: migrate data from the existing spreadsheet) ----- */
const COL_SYNONYMS = {
  description: ['description', 'item description', 'item', 'name', 'product'],
  onHand: ['on hand', 'onhand', 'qty', 'quantity', 'stock', 'count', 'units'],
  costPerItem: ['cost', 'unit cost', 'cost per item', 'price', 'unit price', 'purchase cost'],
  expiry: ['expiry', 'expiry date', 'expires', 'expiration', 'use by'],
  kit: ['kit', 'kit category', 'category', 'group'],
  box: ['box', 'container', 'box / container'],
  supplier: ['supplier', 'vendor'],
  location: ['location', 'loc'],
  stockTarget: ['target', 'stock target', 'min', 'minimum', 'reorder level'],
  unitOfIssue: ['unit of issue', 'unit', 'uom'],
  reorderCode: ['reorder code', 'sku', 'item code', 'code'],
};
function parseCsv(text) {
  const rows = [];
  let row = [], field = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQ) {
      if (ch === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else inQ = false; }
      else field += ch;
    } else if (ch === '"') inQ = true;
    else if (ch === ',') { row.push(field); field = ''; }
    else if (ch === '\n' || ch === '\r') {
      if (ch === '\r' && text[i + 1] === '\n') i++;
      row.push(field); field = '';
      if (row.some(f => f.trim() !== '')) rows.push(row);
      row = [];
    } else field += ch;
  }
  row.push(field);
  if (row.some(f => f.trim() !== '')) rows.push(row);
  return rows;
}
function mapCsvColumns(headerRow) {
  const map = {};
  headerRow.forEach((h, i) => {
    const norm = h.trim().toLowerCase();
    for (const [field, names] of Object.entries(COL_SYNONYMS)) {
      if (map[field] === undefined && names.includes(norm)) map[field] = i;
    }
  });
  return map;
}
function handleCsvFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const rows = parseCsv(String(reader.result));
    if (rows.length < 2) { showCsvError('The file needs a header row plus at least one data row.'); return; }
    const map = mapCsvColumns(rows[0]);
    if (map.description === undefined) {
      showCsvError('Couldn’t find an item description column. Include a header like "Description", "Item" or "Name". Found headers: ' + rows[0].join(', '));
      return;
    }
    const records = rows.slice(1).map(r => ({
      description: (r[map.description] || '').trim(),
      onHand: Number(r[map.onHand]) || 0,
      costPerItem: Number(String(r[map.costPerItem] || '').replace(/[£$,]/g, '')) || 0,
      expiry: (r[map.expiry] || '').trim(),
      kit: (r[map.kit] || 'Imported').trim() || 'Imported',
      box: (r[map.box] || '').trim(),
      supplier: (r[map.supplier] || '').trim(),
      location: (r[map.location] || '').trim(),
      stockTarget: Number(r[map.stockTarget]) || 0,
      unitOfIssue: (r[map.unitOfIssue] || '').trim(),
      reorderCode: (r[map.reorderCode] || '').trim(),
    })).filter(r => r.description);
    if (!records.length) { showCsvError('No usable rows found (every row needs a description).'); return; }
    showCsvPreview(file.name, rows[0], map, records);
  };
  reader.readAsText(file);
}
function showCsvError(msg) {
  const root = document.getElementById('dialogRoot');
  root.innerHTML =
    '<div class="modalOverlay" style="z-index:80"><div class="modal" style="width:min(460px,100%)">' +
    '<h3 style="margin-bottom:6px">Import problem</h3>' +
    '<p class="muted" style="margin-bottom:12px">' + esc(msg) + '</p>' +
    '<div class="actionsRow" style="margin:0">' +
    '<button class="primaryButton" onclick="document.getElementById(\'dialogRoot\').innerHTML=\'\'">OK</button>' +
    '<button class="outlineButton" onclick="downloadCsvTemplate()">Download a template CSV</button>' +
    '</div></div></div>';
}
let pendingImport = null;
function showCsvPreview(filename, headers, map, records) {
  pendingImport = { filename, records };
  const mapped = Object.entries(map).map(([f, i]) => '"' + esc(headers[i]) + '" → ' + f).join(' · ');
  const root = document.getElementById('dialogRoot');
  root.innerHTML =
    '<div class="modalOverlay" style="z-index:80"><div class="modal" style="width:min(620px,100%)">' +
    '<h3 style="margin-bottom:6px">Import from spreadsheet</h3>' +
    '<p class="muted" style="margin-bottom:10px"><strong>' + esc(filename) + '</strong> — ' + records.length + ' items ready to import into ' + esc(wh().label) + '.</p>' +
    '<p class="muted small" style="margin-bottom:10px">Detected columns: ' + mapped + '</p>' +
    '<div class="tableScroll" style="max-height:220px;overflow-y:auto"><table><thead><tr><th>Description</th><th>Qty</th><th>Cost</th><th>Expiry</th><th>Kit</th></tr></thead><tbody>' +
    records.slice(0, 8).map(r => '<tr><td>' + esc(r.description) + '</td><td>' + r.onHand + '</td><td>' + r.costPerItem + '</td><td>' + esc(r.expiry || '—') + '</td><td>' + esc(r.kit) + '</td></tr>').join('') +
    (records.length > 8 ? '<tr><td colspan="5" class="muted small">+ ' + (records.length - 8) + ' more…</td></tr>' : '') +
    '</tbody></table></div>' +
    '<div class="actionsRow" style="margin:14px 0 0">' +
    '<button class="primaryButton" onclick="confirmCsvImport()">Import ' + records.length + ' items</button>' +
    '<button class="outlineButton" onclick="pendingImport=null;document.getElementById(\'dialogRoot\').innerHTML=\'\'">Cancel</button>' +
    '</div></div></div>';
}
function confirmCsvImport() {
  const imp = pendingImport;
  pendingImport = null;
  document.getElementById('dialogRoot').innerHTML = '';
  if (!imp) return;
  // batch-assign barcodes then persist once
  const cfg = wh();
  const stamped = imp.records.map((r, i) => ({
    ...r,
    id: cfg.prefix + '-' + pad6(S.items.length + i + 1) + '_' + Date.now(),
    barcode: cfg.prefix + '-' + pad6(S.items.length + i + 1),
    tariff: '', cpc: '', notes: 'Imported from ' + imp.filename,
    lastCheckedAt: '', createdAt: new Date().toISOString(),
  }));
  S.items = stamped.concat(S.items);
  persistItems();
  recordMovement({
    type: 'registered', itemId: '', barcode: '(batch)',
    description: 'Spreadsheet import: ' + stamped.length + ' items',
    qty: stamped.length, notes: imp.filename,
  });
  render();
}

  downloadCsv(
